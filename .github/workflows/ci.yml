name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.4"

      - run: go build ./...
      - run: go vet ./...
      - run: go test ./...

      - name: gofmt check
        run: |
          diff -u <(echo -n) <(gofmt -l .)
